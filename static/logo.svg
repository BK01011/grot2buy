<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Sync bar top -->
  <rect x="28" y="32" width="72" height="5" rx="2.5" fill="url(#bar)"/>

  <!-- Sync bar middle (shorter, centered) -->
  <rect x="38" y="44" width="52" height="5" rx="2.5" fill="url(#bar)" opacity="0.7"/>

  <!-- G2B text -->
  <text x="64" y="84" text-anchor="middle"
        fill="white" font-size="28" font-weight="800"
        font-family="system-ui,-apple-system,sans-serif"
        letter-spacing="3">G2B</text>

  <!-- Three dots row -->
  <circle cx="52" cy="101" r="3" fill="#06b6d4"/>
  <circle cx="64" cy="101" r="3" fill="#3b82f6"/>
  <circle cx="76" cy="101" r="3" fill="#8b5cf6"/>
</svg>
